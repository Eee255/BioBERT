<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clinical NER — BioBERT Disease Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --danger:    #f85149;
      --warn:      #e3b341;
      --green:     #3fb950;
      --muted:     #8b949e;
      --text:      #e6edf3;
      --text-dim:  #c9d1d9;
      --disease-bg: rgba(248, 81, 73, 0.15);
      --disease-border: rgba(248, 81, 73, 0.5);
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: -1px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }
    header span {
      font-size: 12px;
      color: var(--muted);
      margin-left: 4px;
    }
    .badge {
      margin-left: auto;
      background: rgba(63,185,80,0.12);
      border: 1px solid rgba(63,185,80,0.3);
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 40px;
    }
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; padding: 20px; }
      header { padding: 16px 20px; }
    }

    .panel { padding: 0 24px 0 0; }
    .panel + .panel { padding: 0 0 0 24px; border-left: 1px solid var(--border); }

    .panel-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    /* ── Input area ── */
    textarea {
      width: 100%;
      height: 160px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* ── Sample buttons ── */
    .samples-label {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      margin: 16px 0 8px;
    }
    .samples {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sample-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 12px;
      font-family: var(--font-sans);
      padding: 8px 12px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1.4;
    }
    .sample-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Analyse button ── */
    .run-btn {
      margin-top: 16px;
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0d1117;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      padding: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.5px;
    }
    .run-btn:hover { opacity: 0.85; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Output panel ── */
    .output-scroll {
      height: calc(100vh - 180px);
      overflow-y: auto;
      padding-right: 4px;
    }
    .output-scroll::-webkit-scrollbar { width: 4px; }
    .output-scroll::-webkit-scrollbar-track { background: transparent; }
    .output-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Terminal-style result block */
    .result-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .result-header {
      background: #1c2128;
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .result-header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .result-header .label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-left: 4px;
    }

    .result-input {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .result-input strong {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      font-weight: 500;
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Highlighted text view */
    .highlighted-text {
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.8;
      border-bottom: 1px solid var(--border);
    }
    .entity-span {
      background: var(--disease-bg);
      border: 1px solid var(--disease-border);
      border-radius: 4px;
      padding: 1px 5px;
      color: #ff9492;
      font-weight: 500;
      cursor: default;
      position: relative;
    }
    .entity-span.low-conf {
      border-color: rgba(227,179,65,0.5);
      background: rgba(227,179,65,0.1);
      color: var(--warn);
    }
    .entity-span[title]:hover::after {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1c2128;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text);
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    /* Entity list — notebook-style */
    .entity-list {
      padding: 10px 14px 12px;
      font-family: var(--font-mono);
      font-size: 12px;
    }
    .entity-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      color: var(--text-dim);
    }
    .entity-row:last-child { border-bottom: none; }
    .entity-tag {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.3);
      color: #ff9492;
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 11px;
      flex-shrink: 0;
    }
    .entity-tag.low { background: rgba(227,179,65,0.1); border-color: rgba(227,179,65,0.3); color: var(--warn); }
    .entity-text { flex: 1; color: var(--text); }
    .entity-conf { color: var(--muted); font-size: 11px; }
    .entity-conf.high { color: var(--green); }
    .entity-conf.low { color: var(--warn); }
    .no-entities {
      color: var(--muted);
      font-size: 12px;
      font-family: var(--font-mono);
      padding: 10px 14px;
      font-style: italic;
    }

    /* Separator line */
    .sep-line {
      border: none;
      border-top: 1px dashed var(--border);
      margin: 4px 0;
    }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(88,166,255,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 12px;
      color: var(--muted);
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 13px; font-family: var(--font-mono); }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }
    .stat-item span { color: var(--text); font-weight: 500; }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 14px 40px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
      display: flex;
      gap: 24px;
    }
    footer strong { color: var(--text-dim); }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">NER</div>
  <h1>Clinical NER <span>/ BioBERT Disease Detector</span></h1>
  <div class="badge">Model ready</div>
</header>

<main>
  <!-- LEFT: Input panel -->
  <div class="panel">
    <div class="panel-label">Input</div>

    <textarea id="input-text"
      placeholder="Enter clinical text — e.g. 'The patient was diagnosed with Huntington disease and showed signs of cognitive impairment.'"
      rows="6"></textarea>

    <button class="run-btn" id="run-btn" onclick="runPrediction()">
      Analyse Text →
    </button>

    <div class="samples-label">// Sample clinical sentences</div>
    <div class="samples">
      <button class="sample-btn" onclick="loadSample(0)">The patient was diagnosed with Huntington disease and showed signs of cognitive impairment.</button>
      <button class="sample-btn" onclick="loadSample(1)">Family history of breast cancer and BRCA1 mutations was documented.</button>
      <button class="sample-btn" onclick="loadSample(2)">She presented with acute myocardial infarction, hypertension, and type 2 diabetes mellitus.</button>
      <button class="sample-btn" onclick="loadSample(3)">The child was treated for cystic fibrosis and chronic obstructive pulmonary disease.</button>
    </div>
  </div>

  <!-- RIGHT: Output panel -->
  <div class="panel">
    <div class="panel-label">Results</div>
    <div class="stats-bar" id="stats-bar" style="display:none">
      <div>Entities found: <span id="stat-entities">0</span></div>
      <div>Model: <span>BioBERT-large</span></div>
      <div>Threshold: <span>80%</span></div>
    </div>

    <div class="output-scroll" id="output-area">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
        <p>Results will appear here</p>
      </div>
    </div>

    <div class="spinner" id="spinner"></div>
  </div>
</main>

<footer>
  <div><strong>Model</strong> dmis-lab/biobert-large-cased-v1.1</div>
  <div><strong>Dataset</strong> NCBI Disease Corpus</div>
  <div><strong>Test F1</strong> 0.8811</div>
  <div><strong>Labels</strong> B-Disease · I-Disease · O</div>
</footer>

<script>
  const SAMPLES = [
    "The patient was diagnosed with Huntington disease and showed signs of cognitive impairment.",
    "Family history of breast cancer and BRCA1 mutations was documented.",
    "She presented with acute myocardial infarction, hypertension, and type 2 diabetes mellitus.",
    "The child was treated for cystic fibrosis and chronic obstructive pulmonary disease."
  ];

  function loadSample(i) {
    document.getElementById("input-text").value = SAMPLES[i];
  }

  function buildHighlightedText(text, entities) {
    if (!entities.length) return `<span style="color:var(--text)">${escHtml(text)}</span>`;

    let result = "";
    let cursor = 0;
    const lower = text.toLowerCase();

    for (const ent of entities) {
      const searchTerm = ent.text.toLowerCase();
      const idx = lower.indexOf(searchTerm, cursor);
      if (idx === -1) continue;
      result += escHtml(text.slice(cursor, idx));
      const conf = (ent.confidence * 100).toFixed(2);
      const cls  = ent.low_conf ? "entity-span low-conf" : "entity-span";
      result += `<span class="${cls}" title="${conf}% confidence">${escHtml(text.slice(idx, idx + ent.text.length))}</span>`;
      cursor = idx + ent.text.length;
    }
    result += escHtml(text.slice(cursor));
    return result;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function buildResultBlock(input, entities) {
    const highlightedHtml = buildHighlightedText(input, entities);
    const confClass = (c) => c >= 0.95 ? "high" : c < 0.80 ? "low" : "";

    let entityRows = "";
    if (entities.length === 0) {
      entityRows = `<div class="no-entities">No disease entities detected.</div>`;
    } else {
      for (const ent of entities) {
        const conf    = (ent.confidence * 100).toFixed(2);
        const tagCls  = ent.low_conf ? "entity-tag low" : "entity-tag";
        const confCls = confClass(ent.confidence);
        const flag    = ent.low_conf ? " ⚠" : "";
        entityRows += `
          <div class="entity-row">
            <span class="${tagCls}">Disease</span>
            <span class="entity-text">'${escHtml(ent.text)}'</span>
            <span class="entity-conf ${confCls}">${conf}%${flag}</span>
          </div>`;
      }
    }

    return `
      <div class="result-block">
        <div class="result-header">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <span class="label">Named Entity Recognition Results</span>
        </div>
        <div class="result-input">
          <strong>Input</strong>
          ${escHtml(input)}
        </div>
        <div class="highlighted-text">${highlightedHtml}</div>
        <div class="entity-list">${entityRows}</div>
      </div>`;
  }

  async function runPrediction() {
    const text = document.getElementById("input-text").value.trim();
    if (!text) return;

    const btn     = document.getElementById("run-btn");
    const spinner = document.getElementById("spinner");
    const output  = document.getElementById("output-area");
    const statsBar = document.getElementById("stats-bar");

    btn.disabled = true;
    spinner.classList.add("active");
    output.innerHTML = "";

    try {
      const res  = await fetch("/predict", {
        method : "POST",
        headers: {"Content-Type": "application/json"},
        body   : JSON.stringify({ text }),
      });
      const data = await res.json();

      if (data.error) {
        output.innerHTML = `<div class="no-entities" style="color:var(--danger)">${escHtml(data.error)}</div>`;
        return;
      }

      output.innerHTML = buildResultBlock(data.input, data.entities);

      statsBar.style.display = "flex";
      document.getElementById("stat-entities").textContent = data.entities.length;

    } catch (err) {
      output.innerHTML = `<div class="no-entities" style="color:var(--danger)">Error: ${escHtml(err.message)}</div>`;
    } finally {
      btn.disabled = false;
      spinner.classList.remove("active");
    }
  }

  // Run on Enter key (Ctrl/Cmd+Enter)
  document.getElementById("input-text").addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") runPrediction();
  });
</script>
</body>
</html>
